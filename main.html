<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Reader & Editor — Download</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 32px rgba(0,0,0,0.08);
        }

        .app-icon {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            background: #1a73e8;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-icon svg {
            width: 52px;
            height: 52px;
            fill: white;
        }

        .app-name {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .app-tagline {
            font-size: 15px;
            color: #666;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 36px;
            text-align: left;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #444;
        }

        .feature-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #e8f0fe;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .feature-icon svg {
            width: 16px;
            height: 16px;
            fill: #1a73e8;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #1a73e8;
            color: white;
            text-decoration: none;
            border-radius: 14px;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }

        .download-btn:hover { background: #1557b0; }

        .download-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .redirect-note {
            font-size: 12px;
            color: #999;
            margin-top: 16px;
        }

        .rating {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 32px;
        }

        .stars { color: #fbbc04; font-size: 18px; letter-spacing: 2px; }
        .rating-text { font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="card">

    <div class="app-icon">
        <svg viewBox="0 0 24 24"><path d="M14,2H6C4.9,2,4,2.9,4,4v16c0,1.1,0.9,2,2,2h12c1.1,0,2-0.9,2-2V8L14,2z M16,18H8v-2h8V18z M16,14H8v-2h8V14z M13,9V3.5L18.5,9H13z"/></svg>
    </div>

    <div class="app-name">PDF Reader & Editor</div>
    <div class="app-tagline">Read, edit, annotate and sign PDF documents with ease</div>

    <div class="rating">
        <span class="stars">★★★★★</span>
        <span class="rating-text">4.8 · 100K+ downloads</span>
    </div>

    <div class="features">
        <div class="feature">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24"><path d="M3,17.25V21h3.75L17.81,9.94l-3.75-3.75L3,17.25z M20.71,7.04c0.39-0.39,0.39-1.02,0-1.41l-2.34-2.34c-0.39-0.39-1.02-0.39-1.41,0l-1.83,1.83l3.75,3.75L20.71,7.04z"/></svg>
            </div>
            Edit & annotate PDFs
        </div>
        <div class="feature">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24"><path d="M9,16.2L4.8,12l-1.4,1.4L9,19L21,7l-1.4-1.4L9,16.2z"/></svg>
            </div>
            Fill & sign forms
        </div>
        <div class="feature">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24"><path d="M19,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V5C21,3.9,20.1,3,19,3z M17,13h-4v4h-2v-4H7v-2h4V7h2v4h4V13z"/></svg>
            </div>
            Merge & split documents
        </div>
        <div class="feature">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24"><path d="M18,8h-1V6c0-2.76-2.24-5-5-5S7,3.24,7,6v2H6c-1.1,0-2,0.9-2,2v10c0,1.1,0.9,2,2,2h12c1.1,0,2-0.9,2-2V10C20,8.9,19.1,8,18,8z M12,17c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S13.1,17,12,17z M9,8V6c0-1.66,1.34-3,3-3s3,1.34,3,3v2H9z"/></svg>
            </div>
            Password protect PDFs
        </div>
    </div>

    <a class="download-btn" id="playstore-btn" href="#">
        <svg viewBox="0 0 24 24"><path d="M3,20.5v-17c0-0.83,0.94-1.3,1.6-0.8l14,8.5c0.6,0.36,0.6,1.24,0,1.6l-14,8.5C3.94,21.8,3,21.33,3,20.5z"/></svg>
        Get it on Google Play
    </a>

    <div class="redirect-note" id="redirect-note">You'll be redirected to the Play Store</div>

</div>

<script>
    const PACKAGE_NAME = "com.xsdev.pdfreader.pdfeditor.pdf.document";

    // Read variant and any other params from this page's URL
    // e.g. yoursite.com/download.html?variant=b&source=facebook
    const urlParams = new URLSearchParams(window.location.search);
    const variant  = urlParams.get("variant")  || "";
    const source   = urlParams.get("source")   || "";
    const campaign = urlParams.get("campaign") || "";
    const medium   = urlParams.get("medium")   || "";

    // Build the referrer string dynamically from whatever params are present
    const referrerParams = {};
    if (source)   referrerParams["utm_source"]   = source;
    if (medium)   referrerParams["utm_medium"]   = medium;
    if (campaign) referrerParams["utm_campaign"] = campaign;
    if (variant)  referrerParams["paywall_variant"] = variant;

    const referrerRaw = Object.entries(referrerParams)
        .map(([k, v]) => `${k}=${v}`)
        .join("&");

    const playStoreUrl = referrerRaw
        ? `https://play.google.com/store/apps/details?id=${PACKAGE_NAME}&referrer=${encodeURIComponent(referrerRaw)}`
        : `https://play.google.com/store/apps/details?id=${PACKAGE_NAME}`;

    // Set button href
    document.getElementById("playstore-btn").href = playStoreUrl;

    // Auto redirect after 2 seconds
    let countdown = 2;
    const note = document.getElementById("redirect-note");

    const timer = setInterval(() => {
        countdown--;
        if (countdown > 0) {
            note.textContent = `Redirecting in ${countdown}...`;
        } else {
            clearInterval(timer);
            note.textContent = "Opening Play Store...";
            window.location.href = playStoreUrl;
        }
    }, 1000);
</script>

</body>
</html>
